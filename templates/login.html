<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Risk2Rise AI Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{

height:100vh;
overflow:hidden;
background:black;
color:white;

}

/* particles background */

#particles-js{

position:absolute;
width:100%;
height:100%;
z-index:-1;

}

/* loading screen */

#loader{

position:absolute;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
z-index:10;

animation:hide 2s forwards;
}

@keyframes hide{

100%{
opacity:0;
visibility:hidden;
}

}

/* logo */

.logo{

text-align:center;
font-size:50px;
margin-top:20px;
color:cyan;
text-shadow:0 0 20px cyan;

}

/* container */

.container{

display:flex;
justify-content:center;
gap:50px;
margin-top:50px;

}

.box{

width:320px;
padding:30px;

background:rgba(255,255,255,0.1);

border-radius:20px;

backdrop-filter:blur(15px);

box-shadow:0 0 20px cyan;

transition:.3s;

}

.box:hover{

transform:scale(1.08);
box-shadow:0 0 40px cyan;

}

h2{

text-align:center;
margin-bottom:15px;

}

input{

width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;

}

button{

width:100%;
padding:12px;
border:none;
border-radius:10px;
background:cyan;
font-weight:bold;
cursor:pointer;

}

button:hover{

background:white;
box-shadow:0 0 20px cyan;

}

.icon{

font-size:40px;
text-align:center;

}

.ai{

text-align:center;
color:gray;
margin-top:10px;

}

</style>

</head>

<body>


<div id="loader">

🤖 Loading Risk2Rise AI...

</div>


<div id="particles-js"></div>


<div class="logo">

🧠 Risk2Rise AI

</div>


<div class="ai">

AI-Powered Student Risk Prediction System

</div>


<div class="container">


<div class="box">

<div class="icon">🎓</div>

<h2>Student Login</h2>

<form action="/student_login" method="POST">

<input type="text" placeholder="Student ID" name="student_id">

<input type="password" placeholder="Password" name="password">

<button>Login</button>

</form>

</div>



<div class="box">

<div class="icon">👩‍🏫</div>

<h2>Teacher Login</h2>

<form action="/teacher_login" method="POST">

<input type="text" placeholder="Username" name="username">

<input type="password" placeholder="Password" name="password">

<button>Login</button>

</form>

</div>


</div>


<script>

particlesJS("particles-js", {

"particles": {

"number": { "value": 80 },

"size": { "value": 3 },

"move": { "speed": 2 },

"line_linked": {

"enable": true

}

}

});

</script>


</body>
</html>
